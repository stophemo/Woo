<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>邮箱验证成功 - Woo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 32px;
      background: #4f46e5;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
    }
    .btn:hover {
      background: #4338ca;
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }
    .footer a {
      color: #4f46e5;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>邮箱验证成功！</h1>
    <p>恭喜，你的邮箱已通过验证。</p>
    <p>现在可以回到 Woo 应用，使用你的账号登录了。</p>
    <a href="https://github.com/stophemo/Woo" class="btn" target="_blank">了解 Woo</a>
    <div class="footer">
      <a href="https://github.com/stophemo/Woo" target="_blank">Woo（无我笔记）</a>
      · 专注写作的 Markdown 笔记
    </div>
  </div>
</body>
</html>
