<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3250"/>
      <stop offset="55%" stop-color="#1f2140"/>
      <stop offset="100%" stop-color="#121227"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#faf6ea"/>
      <stop offset="100%" stop-color="#ece4cf"/>
    </linearGradient>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0b0b1a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆角方形 -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- 装饰性光晕 -->
  <circle cx="120" cy="120" r="140" fill="#ffffff" opacity="0.04"/>
  <circle cx="420" cy="430" r="160" fill="#ffffff" opacity="0.03"/>

  <!-- 笔记纸（带右上折角） -->
  <g filter="url(#softShadow)">
    <path d="M140 92 H342 L416 166 V418 C416 434 403 448 386 448 H140 C123 448 110 434 110 418 V122 C110 106 123 92 140 92 Z"
          fill="url(#paperGrad)"/>
    <!-- 折角阴影 -->
    <path d="M342 92 L416 166 H362 C351 166 342 157 342 146 Z" fill="#c9be9b"/>
    <path d="M342 92 L342 146 C342 157 351 166 362 166 L416 166"
          fill="none" stroke="#a89a72" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- 书法 W 笔画（中心视觉符号） -->
  <path d="M150 196
           C 152 188, 164 186, 170 196
           L 208 316
           C 214 334, 230 336, 238 318
           L 272 216
           C 278 200, 290 200, 296 216
           L 330 318
           C 338 336, 354 334, 360 316
           L 398 196
           C 404 186, 416 188, 418 196"
        fill="none" stroke="url(#inkGrad)" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 起笔与收笔的墨点强调 -->
  <circle cx="152" cy="196" r="10" fill="#1a1a2e"/>
  <circle cx="416" cy="196" r="10" fill="#1a1a2e"/>

  <!-- 下方朱红印章 -->
  <rect x="212" y="376" width="88" height="44" rx="6" ry="6" fill="#c73e3a"/>
  <!-- 印章纹理（模拟篆字）—— 用简单几何图形保证在各尺寸下清晰 -->
  <g fill="#faf6ea">
    <rect x="224" y="386" width="22" height="4"/>
    <rect x="233" y="386" width="4" height="24"/>
    <rect x="224" y="406" width="22" height="4"/>
    <rect x="258" y="386" width="30" height="4"/>
    <rect x="258" y="386" width="4" height="24"/>
    <rect x="284" y="386" width="4" height="24"/>
    <rect x="258" y="395" width="30" height="4"/>
    <rect x="258" y="406" width="30" height="4"/>
  </g>
</svg>
