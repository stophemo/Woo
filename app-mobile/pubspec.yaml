name: woo_mobile
description: 无我笔记 - 本地优先的 Markdown 笔记移动端
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 本地数据库
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # 云同步
  supabase_flutter: ^2.5.0

  # 状态管理
  flutter_riverpod: ^2.4.9

  # Markdown 渲染
  flutter_markdown: ^0.6.22

  # UI 辅助
  intl: ^0.19.0
  share_plus: ^7.2.2
  uuid: ^4.3.3

  # 工具
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
