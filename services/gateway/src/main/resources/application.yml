server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      routes:
        # 认证服务
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        # 笔记服务
        - id: note-service
          uri: lb://note-service
          predicates:
            - Path=/api/folders/**,/api/documents/**

# JWT
jwt:
  secret: NonEgoNotesSecretKey2024ThisMustBeAtLeast32BytesLong
