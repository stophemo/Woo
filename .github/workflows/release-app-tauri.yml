name: Release App Tauri

on:
  push:
    tags:
      - "app-tauri-v*"
      - "Woo-tauri-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (default: app-tauri-v<app-tauri/package.json version>)"
        required: false
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean
      notes:
        description: "Custom release notes (Markdown)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  # =============== 桌面端构建 ===============
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $pkg = Get-Content app-tauri/package.json -Raw | ConvertFrom-Json
          $pkgVersion = "$($pkg.version)"

          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}" -replace '^(Woo-tauri-|app-tauri-)?v', ''
            $tag = "${{ github.ref_name }}"
          } else {
            $inputTag = "${{ inputs.tag }}"
            if (-not [string]::IsNullOrWhiteSpace($inputTag)) {
              $tag = $inputTag.Trim()
            } else {
              $tag = "app-tauri-v$pkgVersion"
            }
            $version = $tag -replace '^(Woo-tauri-|app-tauri-)?v', ''
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Patch version files
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          # package.json
          $pkgPath = "app-tauri/package.json"
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content $pkgPath -Encoding utf8
          # Cargo.toml
          $cargo = Get-Content app-tauri/src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace '^(version\s*=\s*)"[^"]+"', "`$1`"$version`""
          Set-Content app-tauri/src-tauri/Cargo.toml $cargo -Encoding utf8
          # tauri.conf.json
          $conf = Get-Content app-tauri/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 10 | Set-Content app-tauri/src-tauri/tauri.conf.json -Encoding utf8
          # Android tauri.properties
          $propPath = "app-tauri/src-tauri/gen/android/app/tauri.properties"
          $prop = "tauri.android.versionCode=$($version -replace '\.', '')`ntauri.android.versionName=$version`n"
          Set-Content $propPath $prop -Encoding utf8
          Write-Host "patched version -> $version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: app-tauri
        run: npm ci

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build desktop package
        working-directory: app-tauri
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run tauri:build

      - name: Zip macOS .app bundle
        if: matrix.os == 'macos-latest'
        working-directory: app-tauri/src-tauri/target/release/bundle/macos
        run: zip -r "Woo_${{ steps.meta.outputs.version }}_aarch64.app.zip" "Woo.app"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-desktop-${{ matrix.os }}
          path: app-tauri/src-tauri/target/release/bundle
          if-no-files-found: error

  # =============== Android 构建 ===============
  build-android:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $pkg = Get-Content app-tauri/package.json -Raw | ConvertFrom-Json
          $pkgVersion = "$($pkg.version)"

          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}" -replace '^(Woo-tauri-|app-tauri-)?v', ''
            $tag = "${{ github.ref_name }}"
          } else {
            $inputTag = "${{ inputs.tag }}"
            if (-not [string]::IsNullOrWhiteSpace($inputTag)) {
              $tag = $inputTag.Trim()
            } else {
              $tag = "app-tauri-v$pkgVersion"
            }
            $version = $tag -replace '^(Woo-tauri-|app-tauri-)?v', ''
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Patch version files
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $pkgPath = "app-tauri/package.json"
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content $pkgPath -Encoding utf8
          $cargo = Get-Content app-tauri/src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace '^(version\s*=\s*)"[^"]+"', "`$1`"$version`""
          Set-Content app-tauri/src-tauri/Cargo.toml $cargo -Encoding utf8
          $conf = Get-Content app-tauri/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 10 | Set-Content app-tauri/src-tauri/tauri.conf.json -Encoding utf8
          $propPath = "app-tauri/src-tauri/gen/android/app/tauri.properties"
          $prop = "tauri.android.versionCode=$($version -replace '\.', '')`ntauri.android.versionName=$version`n"
          Set-Content $propPath $prop -Encoding utf8
          Write-Host "patched version -> $version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-tauri/package-lock.json

      - name: Setup Rust (with Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.3.11579264" "build-tools;35.0.0" "platforms;android-35"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Install dependencies
        working-directory: app-tauri
        run: npm ci

      - name: Build Android APK
        working-directory: app-tauri
        env:
          CI: true
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
        run: npm run tauri:android:build -- --apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android
          path: app-tauri/src-tauri/gen/android/app/build/outputs/apk
          if-no-files-found: error

  # =============== 发布阶段 ===============
  release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $pkg = Get-Content app-tauri/package.json -Raw | ConvertFrom-Json
          $pkgVersion = "$($pkg.version)"

          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}" -replace '^(Woo-tauri-|app-tauri-)?v', ''
            $tag = "${{ github.ref_name }}"
          } else {
            $inputTag = "${{ inputs.tag }}"
            if (-not [string]::IsNullOrWhiteSpace($inputTag)) {
              $tag = $inputTag.Trim()
            } else {
              $tag = "app-tauri-v$pkgVersion"
            }
            $version = $tag -replace '^(Woo-tauri-|app-tauri-)?v', ''
          }

          $draft = "false"
          $prerelease = "false"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.draft }}" -eq "true") { $draft = "true" }
            if ("${{ inputs.prerelease }}" -eq "true") { $prerelease = "true" }
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "draft=$draft" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Ensure tag exists (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git fetch --tags origin
          if ! git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "refs/tags/$TAG"
          else
            echo "Tag $TAG already exists on origin."
          fi

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: tauri-desktop-macos-latest
          path: release/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: tauri-desktop-windows-latest
          path: release/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: tauri-desktop-ubuntu-22.04
          path: release/linux

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: tauri-android
          path: release/android

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $customNotes = "${{ inputs.notes }}"

          if (-not [string]::IsNullOrWhiteSpace($customNotes)) {
            $notes = "## $tag`n`n$customNotes"
          } else {
            $previousTag = git describe --tags --abbrev=0 "$tag^" 2>`$null
            if ($LASTEXITCODE -ne 0) { $previousTag = "" }

            if ($previousTag) {
              $log = git log "$previousTag..$tag" --no-merges --format="%s"
              $feats = @(); $fixes = @(); $docs = @(); $chores = @(); $other = @()
              foreach ($line in $log) {
                if ($line -match '^feat(\(.*?\))?:\s*(.*)') { $feats += $matches[2]; continue }
                if ($line -match '^fix(\(.*?\))?:\s*(.*)')  { $fixes += $matches[2]; continue }
                if ($line -match '^docs?(\(.*?\))?:\s*(.*)') { $docs += $matches[2]; continue }
                if ($line -match '^chore(\(.*?\))?:\s*(.*)') { $chores += $matches[2]; continue }
                $other += $line
              }

              $body = @()
              if ($feats.Length -gt 0)  { $body += "### ✨ 新功能"; $body += $feats | ForEach-Object { "- $_" } }
              if ($fixes.Length -gt 0)  { $body += "`n### 🔧 修复与改进"; $body += $fixes | ForEach-Object { "- $_" } }
              if ($docs.Length -gt 0)   { $body += "`n### 📖 文档"; $body += $docs | ForEach-Object { "- $_" } }
              if ($chores.Length -gt 0) { $body += "`n### 🏗️ 工程"; $body += $chores | ForEach-Object { "- $_" } }
              if ($other.Length -gt 0)  { $body += "`n### 🔄 其他"; $body += $other | ForEach-Object { "- $_" } }
              $body += "`n---`n完整变更: https://github.com/stophemo/Woo/compare/${previousTag}...${tag}"

              $notes = "## $tag`n`n$($body -join "`n")"
            } else {
              $notes = "## $tag`n`n首次发布"
            }
          }

          $notesPath = "$env:RUNNER_TEMP/release-notes.md"
          [System.IO.File]::WriteAllText($notesPath, $notes, [System.Text.Encoding]::UTF8)
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release notes saved to $notesPath"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          NOTES_PATH: ${{ steps.release_notes.outputs.path }}
        run: |
          shopt -s nullglob
          files=(
            release/macos/**/*.app.zip
            release/windows/**/*.exe
            release/linux/**/*.deb
            release/android/**/*.apk
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_PATH" \
            "${files[@]}"
