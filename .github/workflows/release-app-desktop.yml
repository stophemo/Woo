name: Release App Desktop (Deprecated)

on:
  push:
    branches:
      - "electron"
    tags:
      - "app-desktop-v*"
      - "Woo-desktop-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (default: v<app-desktop/package.json version>)"
        required: false
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean
      notes:
        description: "Custom release notes (Markdown). If unset, auto-generates brief changelog link. When set by Claude, provides polished, user-facing notes."
        required: false
        type: string

permissions:
  contents: write

jobs:
  # =============== 构建阶段（双平台并行） ===============
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      notes_path: ${{ steps.release_notes.outputs.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app-desktop/package-lock.json

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $pkg = Get-Content app-desktop/package.json -Raw | ConvertFrom-Json
          $pkgVersion = "$($pkg.version)"

          if ("${{ github.event_name }}" -eq "push") {
            # Tag-push: derive version from tag name, NOT package.json
            # Handles tag formats: v0.4.7, Woo-desktop-v0.4.7, app-desktop-v0.4.7
            $version = "${{ github.ref_name }}" -replace '^(Woo-desktop-|app-desktop-)?v', ''
            $tag = "${{ github.ref_name }}"
          } else {
            # workflow_dispatch
            $version = $pkgVersion
            $tag = "${{ github.ref_name }}"
            $inputTag = "${{ inputs.tag }}"
            if (-not [string]::IsNullOrWhiteSpace($inputTag)) {
              $tag = $inputTag.Trim()
            }
          }

          $draft = "false"
          $prerelease = "false"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.draft }}" -eq "true") { $draft = "true" }
            if ("${{ inputs.prerelease }}" -eq "true") { $prerelease = "true" }
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "draft=$draft" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # Sync the derived version back to package.json so electron-builder
      # produces artifact names matching the release tag.
      - name: Patch package.json version
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $pkgPath = "app-desktop/package.json"
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content $pkgPath -Encoding utf8
          Write-Host "patched package.json version → $version"

      - name: Install dependencies
        working-directory: app-desktop
        run: npm ci

      - name: Build desktop package (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        working-directory: app-desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run electron:build

      - name: Build desktop package (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        working-directory: app-desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run electron:build
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.os }}
          path: app-desktop/release/*
          if-no-files-found: error

  # =============== 发布阶段（windows runner 单独执行） ===============
  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-macos-latest
          path: app-desktop/release

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-windows-latest
          path: app-desktop/release

      - name: List downloaded artifacts
        run: Get-ChildItem -Path app-desktop/release -Recurse
        shell: pwsh

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $pkg = Get-Content app-desktop/package.json -Raw | ConvertFrom-Json
          $pkgVersion = "$($pkg.version)"

          if ("${{ github.event_name }}" -eq "push") {
            # Tag-push: derive version from tag name
            $version = "${{ github.ref_name }}" -replace '^(Woo-desktop-|app-desktop-)?v', ''
            $tag = "${{ github.ref_name }}"
          } else {
            # workflow_dispatch
            $version = $pkgVersion
            $tag = "${{ github.ref_name }}"
            $inputTag = "${{ inputs.tag }}"
            if (-not [string]::IsNullOrWhiteSpace($inputTag)) {
              $tag = $inputTag.Trim()
            }
          }

          $draft = "false"
          $prerelease = "false"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.draft }}" -eq "true") { $draft = "true" }
            if ("${{ inputs.prerelease }}" -eq "true") { $prerelease = "true" }
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "draft=$draft" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # Sync the derived version to package.json (for release notes context)
      - name: Patch package.json version
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $pkgPath = "app-desktop/package.json"
          $pkg = Get-Content $pkgPath -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content $pkgPath -Encoding utf8
          Write-Host "patched package.json version → $version"

      - name: Ensure tag exists (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git fetch --tags origin
          $tagExists = git ls-remote --tags origin "refs/tags/$env:TAG"
          if ([string]::IsNullOrWhiteSpace($tagExists)) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$env:TAG"
            git push origin "refs/tags/$env:TAG"
          } else {
            Write-Host "Tag $env:TAG already exists on origin."
          }
        shell: pwsh

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $customNotes = "${{ inputs.notes }}"

          if (-not [string]::IsNullOrWhiteSpace($customNotes)) {
            # Custom notes from workflow_dispatch (e.g., written by Claude)
            $notes = "## $tag`n`n$customNotes"
          } else {
            # Auto-generate from conventional commits since previous tag
            $previousTag = git describe --tags --abbrev=0 "$tag^" 2>`$null
            if ($LASTEXITCODE -ne 0) { $previousTag = "" }

            if ($previousTag) {
              # Gather commits: feat / fix / chore / docs sections
              $log = git log "$previousTag..$tag" --no-merges --format="%s"
              $feats = @(); $fixes = @(); $docs = @(); $chores = @(); $other = @()
              foreach ($line in $log) {
                if ($line -match '^feat(\(.*?\))?:\s*(.*)') { $feats += $matches[2]; continue }
                if ($line -match '^fix(\(.*?\))?:\s*(.*)')  { $fixes += $matches[2]; continue }
                if ($line -match '^docs?(\(.*?\))?:\s*(.*)') { $docs += $matches[2]; continue }
                if ($line -match '^chore(\(.*?\))?:\s*(.*)') { $chores += $matches[2]; continue }
                $other += $line
              }

              $body = @()
              if ($feats.Length -gt 0)  { $body += "### ✨ 新功能"; $body += $feats | ForEach-Object { "- $_" } }
              if ($fixes.Length -gt 0)  { $body += "`n### 🔧 修复与改进"; $body += $fixes | ForEach-Object { "- $_" } }
              if ($docs.Length -gt 0)   { $body += "`n### 📖 文档"; $body += $docs | ForEach-Object { "- $_" } }
              if ($chores.Length -gt 0) { $body += "`n### 🏗️ 工程"; $body += $chores | ForEach-Object { "- $_" } }
              if ($other.Length -gt 0)  { $body += "`n### 🔄 其他"; $body += $other | ForEach-Object { "- $_" } }
              $body += "`n---`n完整变更: https://github.com/stophemo/Woo/compare/${previousTag}...${tag}"

              $notes = "## $tag`n`n$($body -join "`n")"
            } else {
              $notes = "## $tag`n`n首次发布"
            }
          }

          $notesPath = "$env:TEMP\release-notes.md"
          [System.IO.File]::WriteAllText($notesPath, $notes, [System.Text.Encoding]::UTF8)
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release notes saved to $notesPath"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.release_notes.outputs.path }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          overwrite_files: true
          fail_on_unmatched_files: false
          files: |
            app-desktop/release/*.exe
            app-desktop/release/*.dmg
            app-desktop/release/*.zip
