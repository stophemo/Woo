name: 🚀 Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "版本标签（如 v0.5.2）"
        required: true
        type: string
      draft:
        description: "创建为草稿"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "标记为预发布"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  NODE_VERSION: "20"
  RUST_VERSION: "stable"

jobs:
  # ─── 版本解析 ─────────────────────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      is_manual: ${{ steps.resolve.outputs.is_manual }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - id: resolve
        name: 校验发布标签与源码
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          TAG="$REQUESTED_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "错误: 标签必须符合 vX.Y.Z 格式，当前为: $TAG" >&2
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/tags/$TAG"; then
            echo "错误: 仓库中不存在标签 $TAG" >&2
            exit 1
          fi

          TAG_COMMIT="$(git rev-parse "$TAG^{commit}")"
          CHECKED_OUT_COMMIT="$(git rev-parse HEAD)"
          if [[ "$TAG_COMMIT" != "$CHECKED_OUT_COMMIT" ]]; then
            echo "错误: checkout 源码与标签 $TAG 指向的提交不一致" >&2
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IS_MANUAL="true"
          else
            IS_MANUAL="false"
          fi

          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_manual=${IS_MANUAL}" >> "$GITHUB_OUTPUT"
          echo "✓ 版本: ${VERSION}  标签: ${TAG}"

  # ─── 桌面端构建 ───────────────────────────────────
  desktop:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ needs.meta.outputs.version }}
      tag: ${{ needs.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 确定 macOS 签名模式
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          MISSING=()
          for NAME in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_P8_BASE64; do
            if [[ -z "${!NAME:-}" ]]; then
              MISSING+=("$NAME")
            fi
          done

          if (( ${#MISSING[@]} == 0 )); then
            echo "MACOS_SIGNING_MODE=developer-id" >> "$GITHUB_ENV"
            echo "将使用 Developer ID 正式签名并完成 Apple 公证"
          else
            echo "MACOS_SIGNING_MODE=adhoc" >> "$GITHUB_ENV"
            echo "警告: 缺少正式签名 Secret: ${MISSING[*]}" >&2
            echo "本轮将生成 ad-hoc 签名测试包；安装时需要用户手动放行 Gatekeeper" >&2
          fi

      - name: 导入 Developer ID 证书
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          if [[ "$MACOS_SIGNING_MODE" != "developer-id" ]]; then
            echo "未配置完整 Developer ID 凭据，跳过证书导入"
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/woo-developer-id.p12"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          KEYCHAIN_PATH="$RUNNER_TEMP/woo-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$CERTIFICATE_PATH" "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk '/Developer ID Application:/ {print $2; exit}')"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "错误: 证书中未找到 Developer ID Application 签名身份" >&2
            exit 1
          fi

          echo "MACOS_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"
          echo "已导入 Developer ID Application 证书"

      - name: 构建桌面应用
        if: matrix.os != 'macos-latest'
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run tauri:build

      - name: 构建桌面应用（仅 .app）
        if: matrix.os == 'macos-latest'
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx tauri build --bundles app --target "${{ matrix.target }}" --no-sign --ci

      - name: 签名并按条件公证 macOS 应用
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail

          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Woo.app"
          APP_ZIP="$RUNNER_TEMP/Woo.app.zip"
          if [[ ! -d "$APP" ]]; then
            echo "错误: 未找到 macOS 应用: $APP" >&2
            exit 1
          fi

          EXECUTABLE_NAME="$(/usr/libexec/PlistBuddy \
            -c 'Print :CFBundleExecutable' \
            "$APP/Contents/Info.plist")"
          APP_ARCHS="$(lipo -archs "$APP/Contents/MacOS/$EXECUTABLE_NAME")"
          if [[ "$APP_ARCHS" != "arm64" ]]; then
            echo "错误: macOS 应用必须仅包含 arm64，实际为: $APP_ARCHS" >&2
            exit 1
          fi

          if [[ "$MACOS_SIGNING_MODE" == "developer-id" ]]; then
            codesign \
              --force \
              --deep \
              --options runtime \
              --timestamp \
              --sign "$MACOS_SIGNING_IDENTITY" \
              "$APP"
          else
            codesign \
              --force \
              --deep \
              --options runtime \
              --sign - \
              "$APP"
          fi
          codesign --verify --deep --strict --verbose=2 "$APP"

          SIGN_INFO="$(codesign -d --verbose=4 "$APP" 2>&1)"
          printf '%s\n' "$SIGN_INFO"
          if ! grep -Eq '^flags=.*runtime' <<< "$SIGN_INFO"; then
            echo "错误: .app 未启用 Hardened Runtime" >&2
            exit 1
          fi

          if [[ "$MACOS_SIGNING_MODE" == "developer-id" ]]; then
            if ! grep -Eq '^Authority=Developer ID Application:' <<< "$SIGN_INFO"; then
              echo "错误: .app 未使用 Developer ID Application 签名" >&2
              exit 1
            fi
            if ! grep -Eq '^Timestamp=' <<< "$SIGN_INFO"; then
              echo "错误: .app 签名缺少安全时间戳" >&2
              exit 1
            fi

            ditto -c -k --sequesterRsrc --keepParent "$APP" "$APP_ZIP"
            xcrun notarytool submit "$APP_ZIP" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --wait \
              --timeout 30m
            xcrun stapler staple "$APP"
            xcrun stapler validate "$APP"
            spctl --assess --type execute --verbose=4 "$APP"
          elif ! grep -Eq '^Signature=adhoc' <<< "$SIGN_INFO"; then
            echo "错误: .app 未生成有效的 ad-hoc 签名" >&2
            exit 1
          fi

      - name: 打包、签名并公证 DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail

          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Woo.app"
          STAGING_DIR="$RUNNER_TEMP/woo-dmg-root"
          OUTPUT_DIR="$GITHUB_WORKSPACE/release-output"
          if [[ "$MACOS_SIGNING_MODE" == "developer-id" ]]; then
            DMG="$OUTPUT_DIR/Woo_${VERSION}_aarch64.dmg"
          else
            DMG="$OUTPUT_DIR/Woo_${VERSION}_aarch64-adhoc.dmg"
          fi

          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR" "$OUTPUT_DIR"
          ditto "$APP" "$STAGING_DIR/Woo.app"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "Woo" \
            -srcfolder "$STAGING_DIR" \
            -format UDZO \
            -ov \
            "$DMG"
          if [[ "$MACOS_SIGNING_MODE" == "developer-id" ]]; then
            codesign \
              --force \
              --timestamp \
              --sign "$MACOS_SIGNING_IDENTITY" \
              "$DMG"
          else
            codesign --force --sign - "$DMG"
          fi
          codesign --verify --strict --verbose=2 "$DMG"

          DMG_SIGN_INFO="$(codesign -d --verbose=4 "$DMG" 2>&1)"
          printf '%s\n' "$DMG_SIGN_INFO"
          if [[ "$MACOS_SIGNING_MODE" == "developer-id" ]]; then
            if ! grep -Eq '^Authority=Developer ID Application:' <<< "$DMG_SIGN_INFO"; then
              echo "错误: DMG 未使用 Developer ID Application 签名" >&2
              exit 1
            fi
            if ! grep -Eq '^Timestamp=' <<< "$DMG_SIGN_INFO"; then
              echo "错误: DMG 签名缺少安全时间戳" >&2
              exit 1
            fi

            xcrun notarytool submit "$DMG" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --wait \
              --timeout 30m
            xcrun stapler staple "$DMG"
            xcrun stapler validate "$DMG"
            codesign --verify --strict --verbose=2 "$DMG"
            spctl \
              --assess \
              --type open \
              --context context:primary-signature \
              --verbose=4 \
              "$DMG"
          elif ! grep -Eq '^Signature=adhoc' <<< "$DMG_SIGN_INFO"; then
            echo "错误: DMG 未生成有效的 ad-hoc 签名" >&2
            exit 1
          fi

      - name: 清理 macOS 签名凭据
        if: always() && matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [[ -n "${MACOS_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$MACOS_KEYCHAIN_PATH" || true
          fi
          rm -f \
            "$RUNNER_TEMP/woo-developer-id.p12" \
            "${APPLE_API_KEY_PATH:-$RUNNER_TEMP/missing-api-key}"

      - name: 上传 macOS 安装包
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: woo-desktop-macos
          path: release-output/Woo_${{ needs.meta.outputs.version }}_aarch64*.dmg
          if-no-files-found: error

      - name: 上传 Windows 安装包
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: woo-desktop-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ─── Android 构建 ───────────────────────────────────
  android:
    needs: meta
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ needs.meta.outputs.version }}
      tag: ${{ needs.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 安装 Rust（含 Android 目标）
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 缓存 Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 NDK
        run: |
          sdkmanager "ndk;26.3.11579264" \
                     "build-tools;35.0.0" \
                     "platforms;android-35"

      - name: 安装前端依赖
        run: npm ci

      - name: 校验 Android 签名凭据
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          MISSING=()
          for NAME in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [[ -z "${!NAME:-}" ]]; then
              MISSING+=("$NAME")
            fi
          done

          if (( ${#MISSING[@]} > 0 )); then
            echo "错误: 缺少 Android 发布签名 Secret: ${MISSING[*]}" >&2
            exit 1
          fi

      - name: 构建 Android arm64-v8a APK
        env:
          CI: true
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
        run: npm run tauri:android:build -- --target aarch64 --apk --ci

      - name: 对齐、签名并验证 Android APK
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          UNSIGNED_APK="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          KEYSTORE_PATH="$RUNNER_TEMP/woo-release.keystore"
          ALIGNED_APK="$RUNNER_TEMP/woo-aligned.apk"
          OUTPUT_DIR="$GITHUB_WORKSPACE/release-output"
          SIGNED_APK="$OUTPUT_DIR/Woo_${VERSION}_arm64-v8a.apk"

          cleanup() {
            rm -f "$KEYSTORE_PATH" "$ALIGNED_APK"
          }
          trap cleanup EXIT

          if [[ ! -f "$UNSIGNED_APK" ]]; then
            echo "错误: 未找到预期的 release unsigned APK: $UNSIGNED_APK" >&2
            exit 1
          fi

          mkdir -p "$OUTPUT_DIR"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          "$BUILD_TOOLS/zipalign" -P 16 -f 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --min-sdk-version 24 \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "$BUILD_TOOLS/zipalign" -P 16 -c -v 4 "$SIGNED_APK"
          "$BUILD_TOOLS/apksigner" verify \
            --verbose \
            --print-certs \
            "$SIGNED_APK"

          mapfile -t APK_ABIS < <(
            unzip -Z1 "$SIGNED_APK" \
              | awk -F/ '$1 == "lib" && NF > 2 {print $2}' \
              | sort -u
          )
          if (( ${#APK_ABIS[@]} != 1 )) || [[ "${APK_ABIS[0]:-}" != "arm64-v8a" ]]; then
            echo "错误: APK ABI 必须仅为 arm64-v8a，实际为: ${APK_ABIS[*]:-无}" >&2
            exit 1
          fi

          if [[ "$SIGNED_APK" == *unsigned* ]]; then
            echo "错误: 禁止上传 unsigned APK" >&2
            exit 1
          fi
          echo "已生成并验证 arm64-v8a 签名安装包: $(basename "$SIGNED_APK")"

      - name: 上传 Android 签名安装包
        uses: actions/upload-artifact@v4
        with:
          name: woo-android
          path: release-output/Woo_${{ needs.meta.outputs.version }}_arm64-v8a.apk
          if-no-files-found: error

  # ─── 发布 ──────────────────────────────────────────
  release:
    needs: [meta, desktop, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.tag }}
          fetch-depth: 0

      - name: 生成发布说明
        id: notes
        shell: bash
        run: |
          TAG="${{ needs.meta.outputs.tag }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV" ]; then
            NOTES=$(git log "$PREV..$TAG" --no-merges --format="- %s" \
              | sed 's/^feat(\(.*\)):/* **✨ \1:** /' \
              | sed 's/^feat:/* **✨ 新功能:** /' \
              | sed 's/^fix(\(.*\)):/* **🔧 \1:** /' \
              | sed 's/^fix:/* **🔧 修复:** /' \
              | sed 's/^chore(\(.*\)):/* **🏗️ \1:** /' \
              | sed 's/^chore:/* **🏗️ 工程:** /' \
              | sed 's/^docs(\(.*\)):/* **📖 \1:** /' \
              | sed 's/^docs:/* **📖 文档:** /' \
              | sed 's/^refactor(\(.*\)):/* **♻️ \1:** /' \
              | sed 's/^refactor:/* **♻️ 重构:** /' )
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "## 无我笔记 v${{ needs.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "---" >> "$GITHUB_OUTPUT"
            echo "📦 [完整变更](${{ github.server_url }}/${{ github.repository }}/compare/${PREV}...${TAG})" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "## 无我笔记 v${{ needs.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "🎉 首次发布" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
          echo "✓ 发布说明生成完成"

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: woo-*
          path: release-assets
          merge-multiple: true

      - name: 整理发布文件
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail

          ANDROID_APK="release-assets/Woo_${VERSION}_arm64-v8a.apk"

          mapfile -t MAC_DMG_FILES < <(
            find release-assets -type f -name "Woo_${VERSION}_aarch64*.dmg" -print
          )
          if (( ${#MAC_DMG_FILES[@]} != 1 )); then
            echo "错误: 预期恰好一个 macOS 安装包，实际为 ${#MAC_DMG_FILES[@]} 个" >&2
            exit 1
          fi
          MAC_DMG="${MAC_DMG_FILES[0]}"
          if [[ ! -f "$ANDROID_APK" ]]; then
            echo "错误: 缺少已签名的 Android 安装包: $ANDROID_APK" >&2
            exit 1
          fi

          if find release-assets -type f -iname '*unsigned*.apk' -print -quit | grep -q .; then
            echo "错误: 构建产物中发现 unsigned APK，终止发布" >&2
            exit 1
          fi

          mapfile -t WINDOWS_INSTALLERS < <(find release-assets -type f -name '*.exe' -print)
          if (( ${#WINDOWS_INSTALLERS[@]} != 1 )); then
            echo "错误: 预期恰好一个 Windows 安装包，实际为 ${#WINDOWS_INSTALLERS[@]} 个" >&2
            exit 1
          fi

          mkdir -p release
          cp "$MAC_DMG" "$ANDROID_APK" "${WINDOWS_INSTALLERS[0]}" release/
          ls -lh release/

      - name: 创建 GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
          NOTES: ${{ steps.notes.outputs.notes }}
          IS_MANUAL: ${{ needs.meta.outputs.is_manual }}
        run: |
          set -euo pipefail

          FILES=(release/*)
          if [ ${#FILES[@]} -eq 0 ] || [ ! -e "${FILES[0]}" ]; then
            echo "⚠️ 没有找到发布文件"
            exit 1
          fi

          DRAFT="${{ inputs.draft }}"
          PRERELEASE="${{ inputs.prerelease }}"

          if [ "$IS_MANUAL" == "true" ]; then
            DRAFT_FLAG="${DRAFT:-true}"
            PRERELEASE_FLAG="${PRERELEASE:-false}"
          else
            DRAFT_FLAG="false"
            PRERELEASE_FLAG="false"
          fi

          if compgen -G 'release/*-adhoc.dmg' >/dev/null; then
            NOTES+=$'\n\n> ⚠️ macOS 包使用 ad-hoc 签名，未完成 Apple 公证。首次打开请在 Finder 中右键 Woo.app 并选择“打开”，或在“系统设置 → 隐私与安全”中选择“仍要打开”。无需、也不要安装任何第三方根证书。'
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，更新中..."
            while IFS= read -r ASSET_NAME; do
              if [[ -n "$ASSET_NAME" ]]; then
                gh release delete-asset "$TAG" "$ASSET_NAME" --yes
              fi
            done < <(gh release view "$TAG" --json assets --jq '.assets[].name')
            gh release upload "$TAG" "${FILES[@]}" --clobber
            gh release edit "$TAG" --notes "$NOTES"
          else
            echo "创建 Release $TAG..."
            gh release create "$TAG" \
              --title "无我笔记 v${{ needs.meta.outputs.version }}" \
              --notes "$NOTES" \
              --draft="$DRAFT_FLAG" \
              --prerelease="$PRERELEASE_FLAG" \
              "${FILES[@]}"
          fi
          echo "✓ Release 发布完成: $TAG"
