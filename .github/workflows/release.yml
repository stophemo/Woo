name: 🚀 Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "版本标签（如 v0.5.2）"
        required: true
        type: string
      draft:
        description: "创建为草稿"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "标记为预发布"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  NODE_VERSION: "20"
  RUST_VERSION: "stable"

jobs:
  # ─── 版本解析 ─────────────────────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      commit: ${{ steps.resolve.outputs.commit }}
      revision: ${{ steps.resolve.outputs.revision }}
      is_manual: ${{ steps.resolve.outputs.is_manual }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - id: resolve
        name: 校验发布标签与源码
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          TAG="$REQUESTED_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "错误: 标签必须符合 vX.Y.Z 格式，当前为: $TAG" >&2
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/tags/$TAG"; then
            echo "错误: 仓库中不存在标签 $TAG" >&2
            exit 1
          fi

          TAG_COMMIT="$(git rev-parse "$TAG^{commit}")"
          CHECKED_OUT_COMMIT="$(git rev-parse HEAD)"
          if [[ "$TAG_COMMIT" != "$CHECKED_OUT_COMMIT" ]]; then
            echo "错误: checkout 源码与标签 $TAG 指向的提交不一致" >&2
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IS_MANUAL="true"
          else
            IS_MANUAL="false"
          fi

          VERSION="${TAG#v}"
          REVISION="${TAG_COMMIT:0:8}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=${TAG_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"
          echo "is_manual=${IS_MANUAL}" >> "$GITHUB_OUTPUT"
          echo "✓ 版本: ${VERSION}  标签: ${TAG}  修订: ${REVISION}"

  # ─── 桌面端构建 ───────────────────────────────────
  desktop:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ needs.meta.outputs.version }}
      tag: ${{ needs.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.commit }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 生成发布版本配置
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          printf '{"version":"%s"}\n' "$VERSION" > src-tauri/tauri.release.conf.json

      - name: 验证自动更新签名密钥
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "错误: 缺少 TAURI_SIGNING_PRIVATE_KEY，无法生成可信的一键更新包" >&2
            exit 1
          fi

      - name: 确定 macOS 签名模式
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          MISSING=()
          for NAME in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_P8_BASE64; do
            if [[ -z "${!NAME:-}" ]]; then
              MISSING+=("$NAME")
            fi
          done

          if (( ${#MISSING[@]} == 0 )); then
            echo "MACOS_SIGNING_MODE=developer-id" >> "$GITHUB_ENV"
            echo "将使用 Developer ID 正式签名并完成 Apple 公证"
          else
            echo "MACOS_SIGNING_MODE=adhoc" >> "$GITHUB_ENV"
            echo "警告: 缺少正式签名 Secret: ${MISSING[*]}" >&2
            echo "本轮将生成 ad-hoc 签名测试包；安装时需要用户手动放行 Gatekeeper" >&2
          fi

      - name: 导入 Developer ID 证书
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          if [[ "$MACOS_SIGNING_MODE" != "developer-id" ]]; then
            echo "未配置完整 Developer ID 凭据，跳过证书导入"
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/woo-developer-id.p12"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          KEYCHAIN_PATH="$RUNNER_TEMP/woo-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          chmod 600 "$CERTIFICATE_PATH" "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk '/Developer ID Application:/ {print $2; exit}')"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "错误: 证书中未找到 Developer ID Application 签名身份" >&2
            exit 1
          fi

          echo "MACOS_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"
          echo "已导入 Developer ID Application 证书"

      - name: 构建桌面应用
        if: matrix.os != 'macos-latest'
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx tauri build --config src-tauri/tauri.release.conf.json --ci

      - name: 构建桌面应用（仅 .app）
        if: matrix.os == 'macos-latest'
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx tauri build --config src-tauri/tauri.release.conf.json --bundles app --target "${{ matrix.target }}" --no-sign --ci

      - name: 运行 Rust 库测试
        if: matrix.os == 'macos-latest'
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml --lib

      - name: 签名并按条件公证 macOS 应用
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail

          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Woo.app"
          APP_ZIP="$RUNNER_TEMP/Woo.app.zip"
          if [[ ! -d "$APP" ]]; then
            echo "错误: 未找到 macOS 应用: $APP" >&2
            exit 1
          fi

          EXECUTABLE_NAME="$(/usr/libexec/PlistBuddy \
            -c 'Print :CFBundleExecutable' \
            "$APP/Contents/Info.plist")"
          APP_ARCHS="$(lipo -archs "$APP/Contents/MacOS/$EXECUTABLE_NAME")"
          if [[ "$APP_ARCHS" != "arm64" ]]; then
            echo "错误: macOS 应用必须仅包含 arm64，实际为: $APP_ARCHS" >&2
            exit 1
          fi

          if [[ "$MACOS_SIGNING_MODE" == "developer-id" ]]; then
            codesign \
              --force \
              --deep \
              --options runtime \
              --timestamp \
              --sign "$MACOS_SIGNING_IDENTITY" \
              "$APP"
          else
            codesign \
              --force \
              --deep \
              --options runtime \
              --sign - \
              "$APP"
          fi
          codesign --verify --deep --strict --verbose=2 "$APP"

          SIGN_INFO="$(codesign -d --verbose=4 "$APP" 2>&1)"
          printf '%s\n' "$SIGN_INFO"
          if ! grep -Eq '^CodeDirectory .*flags=.*\([^)]*runtime[^)]*\)' <<< "$SIGN_INFO"; then
            echo "错误: .app 未启用 Hardened Runtime" >&2
            exit 1
          fi

          if [[ "$MACOS_SIGNING_MODE" == "developer-id" ]]; then
            if ! grep -Eq '^Authority=Developer ID Application:' <<< "$SIGN_INFO"; then
              echo "错误: .app 未使用 Developer ID Application 签名" >&2
              exit 1
            fi
            if ! grep -Eq '^Timestamp=' <<< "$SIGN_INFO"; then
              echo "错误: .app 签名缺少安全时间戳" >&2
              exit 1
            fi

            ditto -c -k --sequesterRsrc --keepParent "$APP" "$APP_ZIP"
            xcrun notarytool submit "$APP_ZIP" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --wait \
              --timeout 30m
            xcrun stapler staple "$APP"
            xcrun stapler validate "$APP"
            spctl --assess --type execute --verbose=4 "$APP"
          elif ! grep -Eq '^Signature=adhoc' <<< "$SIGN_INFO"; then
            echo "错误: .app 未生成有效的 ad-hoc 签名" >&2
            exit 1
          fi

      - name: 打包、签名并公证 DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          REVISION: ${{ needs.meta.outputs.revision }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail

          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Woo.app"
          STAGING_DIR="$RUNNER_TEMP/woo-dmg-root"
          OUTPUT_DIR="$GITHUB_WORKSPACE/release-output"
          if [[ "$MACOS_SIGNING_MODE" == "developer-id" ]]; then
            DMG="$OUTPUT_DIR/Woo_${VERSION}_${REVISION}_macos-arm64.dmg"
          else
            DMG="$OUTPUT_DIR/Woo_${VERSION}_${REVISION}_macos-arm64-adhoc.dmg"
          fi

          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR" "$OUTPUT_DIR"
          ditto "$APP" "$STAGING_DIR/Woo.app"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "Woo" \
            -srcfolder "$STAGING_DIR" \
            -format UDZO \
            -ov \
            "$DMG"
          if [[ "$MACOS_SIGNING_MODE" == "developer-id" ]]; then
            codesign \
              --force \
              --timestamp \
              --sign "$MACOS_SIGNING_IDENTITY" \
              "$DMG"
          else
            codesign --force --sign - "$DMG"
          fi
          codesign --verify --strict --verbose=2 "$DMG"

          DMG_SIGN_INFO="$(codesign -d --verbose=4 "$DMG" 2>&1)"
          printf '%s\n' "$DMG_SIGN_INFO"
          if [[ "$MACOS_SIGNING_MODE" == "developer-id" ]]; then
            if ! grep -Eq '^Authority=Developer ID Application:' <<< "$DMG_SIGN_INFO"; then
              echo "错误: DMG 未使用 Developer ID Application 签名" >&2
              exit 1
            fi
            if ! grep -Eq '^Timestamp=' <<< "$DMG_SIGN_INFO"; then
              echo "错误: DMG 签名缺少安全时间戳" >&2
              exit 1
            fi

            xcrun notarytool submit "$DMG" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --wait \
              --timeout 30m
            xcrun stapler staple "$DMG"
            xcrun stapler validate "$DMG"
            codesign --verify --strict --verbose=2 "$DMG"
            spctl \
              --assess \
              --type open \
              --context context:primary-signature \
              --verbose=4 \
              "$DMG"
          elif ! grep -Eq '^Signature=adhoc' <<< "$DMG_SIGN_INFO"; then
            echo "错误: DMG 未生成有效的 ad-hoc 签名" >&2
            exit 1
          fi

      - name: 生成并签名 macOS 自动更新包
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          REVISION: ${{ needs.meta.outputs.revision }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Woo.app"
          OUTPUT_DIR="$GITHUB_WORKSPACE/release-output"
          ARCHIVE="$OUTPUT_DIR/Woo_${VERSION}_${REVISION}_macos-arm64.app.tar.gz"
          mkdir -p "$OUTPUT_DIR"

          tar -czf "$ARCHIVE" -C "$(dirname "$APP")" "$(basename "$APP")"
          npx tauri signer sign --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$ARCHIVE"
          test -s "$ARCHIVE.sig"

      - name: 清理 macOS 签名凭据
        if: always() && matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [[ -n "${MACOS_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$MACOS_KEYCHAIN_PATH" || true
          fi
          rm -f \
            "$RUNNER_TEMP/woo-developer-id.p12" \
            "${APPLE_API_KEY_PATH:-$RUNNER_TEMP/missing-api-key}"

      - name: 上传 macOS 安装包
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: woo-desktop-macos
          path: |
            release-output/Woo_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.revision }}_macos-arm64*.dmg
            release-output/Woo_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.revision }}_macos-arm64.app.tar.gz
            release-output/Woo_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.revision }}_macos-arm64.app.tar.gz.sig
          if-no-files-found: error

      - name: 规范化 Windows 安装包名称
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          REVISION: ${{ needs.meta.outputs.revision }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          INSTALLERS=(src-tauri/target/release/bundle/nsis/*.exe)
          if (( ${#INSTALLERS[@]} != 1 )) || [[ ! -f "${INSTALLERS[0]}" ]]; then
            echo "错误: 预期恰好一个 Windows 安装包" >&2
            exit 1
          fi

          OUTPUT_DIR="release-output"
          WINDOWS_INSTALLER="$OUTPUT_DIR/Woo_${VERSION}_${REVISION}_windows-x64-setup.exe"
          mkdir -p "$OUTPUT_DIR"
          cp "${INSTALLERS[0]}" "$WINDOWS_INSTALLER"
          npx tauri signer sign --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$WINDOWS_INSTALLER"
          test -s "$WINDOWS_INSTALLER.sig"

      - name: 上传 Windows 安装包
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: woo-desktop-windows
          path: |
            release-output/Woo_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.revision }}_windows-x64-setup.exe
            release-output/Woo_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.revision }}_windows-x64-setup.exe.sig
          if-no-files-found: error

  # ─── Android 构建 ───────────────────────────────────
  android:
    needs: meta
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ needs.meta.outputs.version }}
      tag: ${{ needs.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.commit }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 安装 Rust（含 Android 目标）
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 缓存 Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 NDK
        run: |
          sdkmanager "ndk;26.3.11579264" \
                     "build-tools;35.0.0" \
                     "platforms;android-35"

      - name: 安装前端依赖
        run: npm ci

      - name: 生成发布版本配置
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          printf '{"version":"%s"}\n' "$VERSION" > src-tauri/tauri.release.conf.json

      - name: 校验 Android 签名凭据
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          MISSING=()
          for NAME in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [[ -z "${!NAME:-}" ]]; then
              MISSING+=("$NAME")
            fi
          done

          if (( ${#MISSING[@]} > 0 )); then
            echo "错误: 缺少 Android 发布签名 Secret: ${MISSING[*]}" >&2
            exit 1
          fi

      - name: 构建 Android arm64-v8a APK
        env:
          CI: true
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
        run: npm run tauri:android:build -- --config src-tauri/tauri.release.conf.json --target aarch64 --apk --ci

      - name: 对齐、签名并验证 Android APK
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          REVISION: ${{ needs.meta.outputs.revision }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          UNSIGNED_APK="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          KEYSTORE_PATH="$RUNNER_TEMP/woo-release.keystore"
          ALIGNED_APK="$RUNNER_TEMP/woo-aligned.apk"
          OUTPUT_DIR="$GITHUB_WORKSPACE/release-output"
          SIGNED_APK="$OUTPUT_DIR/Woo_${VERSION}_${REVISION}_android-arm64-v8a.apk"

          cleanup() {
            rm -f "$KEYSTORE_PATH" "$ALIGNED_APK"
          }
          trap cleanup EXIT

          if [[ ! -f "$UNSIGNED_APK" ]]; then
            echo "错误: 未找到预期的 release unsigned APK: $UNSIGNED_APK" >&2
            exit 1
          fi

          mkdir -p "$OUTPUT_DIR"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          "$BUILD_TOOLS/zipalign" -P 16 -f 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --min-sdk-version 24 \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "$BUILD_TOOLS/zipalign" -P 16 -c -v 4 "$SIGNED_APK"
          "$BUILD_TOOLS/apksigner" verify \
            --verbose \
            --print-certs \
            "$SIGNED_APK"

          mapfile -t APK_ABIS < <(
            unzip -Z1 "$SIGNED_APK" \
              | awk -F/ '$1 == "lib" && NF > 2 {print $2}' \
              | sort -u
          )
          if (( ${#APK_ABIS[@]} != 1 )) || [[ "${APK_ABIS[0]:-}" != "arm64-v8a" ]]; then
            echo "错误: APK ABI 必须仅为 arm64-v8a，实际为: ${APK_ABIS[*]:-无}" >&2
            exit 1
          fi

          if [[ "$SIGNED_APK" == *unsigned* ]]; then
            echo "错误: 禁止上传 unsigned APK" >&2
            exit 1
          fi
          echo "已生成并验证 arm64-v8a 签名安装包: $(basename "$SIGNED_APK")"

      - name: 上传 Android 签名安装包
        uses: actions/upload-artifact@v4
        with:
          name: woo-android
          path: release-output/Woo_${{ needs.meta.outputs.version }}_${{ needs.meta.outputs.revision }}_android-arm64-v8a.apk
          if-no-files-found: error

  # ─── 发布 ──────────────────────────────────────────
  release:
    needs: [meta, desktop, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.commit }}
          fetch-depth: 0

      - name: 生成发布说明
        id: notes
        shell: bash
        run: |
          TAG="${{ needs.meta.outputs.tag }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV" ]; then
            NOTES=$(git log "$PREV..$TAG" --no-merges --format="- %s" \
              | sed 's/^feat(\(.*\)):/* **✨ \1:** /' \
              | sed 's/^feat:/* **✨ 新功能:** /' \
              | sed 's/^fix(\(.*\)):/* **🔧 \1:** /' \
              | sed 's/^fix:/* **🔧 修复:** /' \
              | sed 's/^chore(\(.*\)):/* **🏗️ \1:** /' \
              | sed 's/^chore:/* **🏗️ 工程:** /' \
              | sed 's/^docs(\(.*\)):/* **📖 \1:** /' \
              | sed 's/^docs:/* **📖 文档:** /' \
              | sed 's/^refactor(\(.*\)):/* **♻️ \1:** /' \
              | sed 's/^refactor:/* **♻️ 重构:** /' )
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "## 无我笔记 v${{ needs.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "---" >> "$GITHUB_OUTPUT"
            echo "📦 [完整变更](${{ github.server_url }}/${{ github.repository }}/compare/${PREV}...${TAG})" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "## 无我笔记 v${{ needs.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "🎉 首次发布" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
          echo "✓ 发布说明生成完成"

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: woo-*
          path: release-assets
          merge-multiple: true

      - name: 整理发布文件
        id: assets
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          REVISION: ${{ needs.meta.outputs.revision }}
          TAG: ${{ needs.meta.outputs.tag }}
          NOTES: ${{ steps.notes.outputs.notes }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ ! "$REVISION" =~ ^[0-9a-f]{8}$ ]]; then
            echo "错误: revision 必须是 8 位小写十六进制，当前为: $REVISION" >&2
            exit 1
          fi

          MAC_RELEASE_NAME="Woo_${VERSION}_${REVISION}_macos-arm64.dmg"
          MAC_ADHOC_NAME="Woo_${VERSION}_${REVISION}_macos-arm64-adhoc.dmg"
          ANDROID_NAME="Woo_${VERSION}_${REVISION}_android-arm64-v8a.apk"
          WINDOWS_NAME="Woo_${VERSION}_${REVISION}_windows-x64-setup.exe"
          MAC_UPDATER_NAME="Woo_${VERSION}_${REVISION}_macos-arm64.app.tar.gz"
          MAC_UPDATER_SIG_NAME="${MAC_UPDATER_NAME}.sig"
          WINDOWS_SIG_NAME="${WINDOWS_NAME}.sig"
          MAC_DOWNLOAD_NAME="Woo_macos-arm64.dmg"
          ANDROID_DOWNLOAD_NAME="Woo_android-arm64-v8a.apk"
          WINDOWS_DOWNLOAD_NAME="Woo_windows-x64-setup.exe"
          CHECKSUMS_NAME="Woo_${VERSION}_${REVISION}_SHA256SUMS.txt"
          LATEST_NAME="latest.json"

          mapfile -t ALL_FILES < <(find release-assets -type f -print)
          if (( ${#ALL_FILES[@]} != 6 )); then
            echo "错误: 预期三个安装包、两个更新签名和一个 macOS 更新包，实际为 ${#ALL_FILES[@]} 个" >&2
            exit 1
          fi

          mapfile -t MAC_DMG_FILES < <(
            find release-assets -type f \
              \( -name "$MAC_RELEASE_NAME" -o -name "$MAC_ADHOC_NAME" \) \
              -print
          )
          if (( ${#MAC_DMG_FILES[@]} != 1 )); then
            echo "错误: 预期恰好一个 macOS 安装包，实际为 ${#MAC_DMG_FILES[@]} 个" >&2
            exit 1
          fi
          MAC_DMG="${MAC_DMG_FILES[0]}"

          mapfile -t MAC_UPDATER_FILES < <(find release-assets -type f -name "$MAC_UPDATER_NAME" -print)
          mapfile -t MAC_UPDATER_SIG_FILES < <(find release-assets -type f -name "$MAC_UPDATER_SIG_NAME" -print)
          if (( ${#MAC_UPDATER_FILES[@]} != 1 || ${#MAC_UPDATER_SIG_FILES[@]} != 1 )); then
            echo "错误: macOS 自动更新包或签名数量不正确" >&2
            exit 1
          fi
          MAC_UPDATER="${MAC_UPDATER_FILES[0]}"
          MAC_UPDATER_SIG="${MAC_UPDATER_SIG_FILES[0]}"

          mapfile -t ANDROID_APKS < <(
            find release-assets -type f -name "$ANDROID_NAME" -print
          )
          mapfile -t ALL_APKS < <(find release-assets -type f -name '*.apk' -print)
          if (( ${#ANDROID_APKS[@]} != 1 || ${#ALL_APKS[@]} != 1 )); then
            echo "错误: Android artifact 必须只有一个精确命名的签名 APK" >&2
            exit 1
          fi
          ANDROID_APK="${ANDROID_APKS[0]}"

          if find release-assets -type f -iname '*unsigned*.apk' -print -quit | grep -q .; then
            echo "错误: 构建产物中发现 unsigned APK，终止发布" >&2
            exit 1
          fi

          mapfile -t WINDOWS_INSTALLERS < <(
            find release-assets -type f -name "$WINDOWS_NAME" -print
          )
          mapfile -t ALL_WINDOWS_INSTALLERS < <(find release-assets -type f -name '*.exe' -print)
          if (( ${#WINDOWS_INSTALLERS[@]} != 1 || ${#ALL_WINDOWS_INSTALLERS[@]} != 1 )); then
            echo "错误: Windows artifact 必须只有一个精确命名的安装包" >&2
            exit 1
          fi
          WINDOWS_INSTALLER="${WINDOWS_INSTALLERS[0]}"

          mapfile -t WINDOWS_SIG_FILES < <(find release-assets -type f -name "$WINDOWS_SIG_NAME" -print)
          if (( ${#WINDOWS_SIG_FILES[@]} != 1 )); then
            echo "错误: Windows 自动更新签名数量不正确" >&2
            exit 1
          fi
          WINDOWS_SIG="${WINDOWS_SIG_FILES[0]}"

          mkdir -p release
          cp \
            "$MAC_DMG" \
            "$MAC_UPDATER" \
            "$MAC_UPDATER_SIG" \
            "$ANDROID_APK" \
            "$WINDOWS_INSTALLER" \
            "$WINDOWS_SIG" \
            release/
          cp "$MAC_DMG" "release/$MAC_DOWNLOAD_NAME"
          cp "$ANDROID_APK" "release/$ANDROID_DOWNLOAD_NAME"
          cp "$WINDOWS_INSTALLER" "release/$WINDOWS_DOWNLOAD_NAME"

          MAC_NAME="$(basename "$MAC_DMG")"
          pushd release >/dev/null
          sha256sum \
            "$MAC_NAME" \
            "$MAC_DOWNLOAD_NAME" \
            "$MAC_UPDATER_NAME" \
            "$MAC_UPDATER_SIG_NAME" \
            "$ANDROID_NAME" \
            "$ANDROID_DOWNLOAD_NAME" \
            "$WINDOWS_NAME" \
            "$WINDOWS_DOWNLOAD_NAME" \
            "$WINDOWS_SIG_NAME" \
            > "$CHECKSUMS_NAME"
          sha256sum --check "$CHECKSUMS_NAME"
          popd >/dev/null

          RELEASE_BASE_URL="${SERVER_URL}/${REPOSITORY}/releases/download/${TAG}"
          PUB_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          MAC_SIGNATURE="$(tr -d '\r\n' < "release/$MAC_UPDATER_SIG_NAME")"
          WINDOWS_SIGNATURE="$(tr -d '\r\n' < "release/$WINDOWS_SIG_NAME")"
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pubDate "$PUB_DATE" \
            --arg macUrl "$RELEASE_BASE_URL/$MAC_UPDATER_NAME" \
            --arg macSignature "$MAC_SIGNATURE" \
            --arg androidUrl "$RELEASE_BASE_URL/$ANDROID_DOWNLOAD_NAME" \
            --arg windowsUrl "$RELEASE_BASE_URL/$WINDOWS_NAME" \
            --arg windowsSignature "$WINDOWS_SIGNATURE" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pubDate,
              android: { url: $androidUrl },
              platforms: {
                "darwin-aarch64": { url: $macUrl, signature: $macSignature },
                "windows-x86_64": { url: $windowsUrl, signature: $windowsSignature }
              }
            }' > "release/$LATEST_NAME"
          jq empty "release/$LATEST_NAME"

          echo "mac_name=$MAC_NAME" >> "$GITHUB_OUTPUT"
          echo "mac_updater_name=$MAC_UPDATER_NAME" >> "$GITHUB_OUTPUT"
          echo "mac_updater_sig_name=$MAC_UPDATER_SIG_NAME" >> "$GITHUB_OUTPUT"
          echo "android_name=$ANDROID_NAME" >> "$GITHUB_OUTPUT"
          echo "windows_name=$WINDOWS_NAME" >> "$GITHUB_OUTPUT"
          echo "windows_sig_name=$WINDOWS_SIG_NAME" >> "$GITHUB_OUTPUT"
          echo "mac_download_name=$MAC_DOWNLOAD_NAME" >> "$GITHUB_OUTPUT"
          echo "android_download_name=$ANDROID_DOWNLOAD_NAME" >> "$GITHUB_OUTPUT"
          echo "windows_download_name=$WINDOWS_DOWNLOAD_NAME" >> "$GITHUB_OUTPUT"
          echo "checksums_name=$CHECKSUMS_NAME" >> "$GITHUB_OUTPUT"
          echo "latest_name=$LATEST_NAME" >> "$GITHUB_OUTPUT"
          ls -lh release/

      - name: 创建 GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
          NOTES: ${{ steps.notes.outputs.notes }}
          IS_MANUAL: ${{ needs.meta.outputs.is_manual }}
          MAC_NAME: ${{ steps.assets.outputs.mac_name }}
          MAC_UPDATER_NAME: ${{ steps.assets.outputs.mac_updater_name }}
          MAC_UPDATER_SIG_NAME: ${{ steps.assets.outputs.mac_updater_sig_name }}
          ANDROID_NAME: ${{ steps.assets.outputs.android_name }}
          WINDOWS_NAME: ${{ steps.assets.outputs.windows_name }}
          WINDOWS_SIG_NAME: ${{ steps.assets.outputs.windows_sig_name }}
          MAC_DOWNLOAD_NAME: ${{ steps.assets.outputs.mac_download_name }}
          ANDROID_DOWNLOAD_NAME: ${{ steps.assets.outputs.android_download_name }}
          WINDOWS_DOWNLOAD_NAME: ${{ steps.assets.outputs.windows_download_name }}
          CHECKSUMS_NAME: ${{ steps.assets.outputs.checksums_name }}
          LATEST_NAME: ${{ steps.assets.outputs.latest_name }}
        run: |
          set -euo pipefail

          FILES=(
            "release/$MAC_NAME"
            "release/$MAC_UPDATER_NAME"
            "release/$MAC_UPDATER_SIG_NAME"
            "release/$ANDROID_NAME"
            "release/$WINDOWS_NAME"
            "release/$WINDOWS_SIG_NAME"
            "release/$MAC_DOWNLOAD_NAME"
            "release/$ANDROID_DOWNLOAD_NAME"
            "release/$WINDOWS_DOWNLOAD_NAME"
            "release/$CHECKSUMS_NAME"
            "release/$LATEST_NAME"
          )
          for FILE in "${FILES[@]}"; do
            if [[ ! -f "$FILE" ]]; then
              echo "错误: 缺少发布白名单文件: $FILE" >&2
              exit 1
            fi
          done

          if [[ "$ANDROID_NAME" == *unsigned* ]] \
            || find release -type f -iname '*unsigned*.apk' -print -quit | grep -q .; then
            echo "错误: 禁止发布 unsigned APK" >&2
            exit 1
          fi

          DRAFT="${{ inputs.draft }}"
          PRERELEASE="${{ inputs.prerelease }}"

          if [ "$IS_MANUAL" == "true" ]; then
            DRAFT_FLAG="${DRAFT:-true}"
            PRERELEASE_FLAG="${PRERELEASE:-false}"
          else
            DRAFT_FLAG="false"
            PRERELEASE_FLAG="false"
          fi

          if [[ "$MAC_NAME" == *-adhoc.dmg ]]; then
            NOTES+=$'\n\n> ⚠️ macOS 包使用 ad-hoc 签名，未完成 Apple 公证。首次打开请在 Finder 中右键 Woo.app 并选择“打开”，或在“系统设置 → 隐私与安全”中选择“仍要打开”。无需、也不要安装任何第三方根证书。'
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，更新中..."
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            echo "创建 Release $TAG..."
            gh release create "$TAG" \
              --title "无我笔记 v${{ needs.meta.outputs.version }}" \
              --notes "$NOTES" \
              --draft="$DRAFT_FLAG" \
              --prerelease="$PRERELEASE_FLAG" \
              "${FILES[@]}"
          fi

          WHITELIST=(
            "$MAC_NAME"
            "$MAC_UPDATER_NAME"
            "$MAC_UPDATER_SIG_NAME"
            "$ANDROID_NAME"
            "$WINDOWS_NAME"
            "$WINDOWS_SIG_NAME"
            "$MAC_DOWNLOAD_NAME"
            "$ANDROID_DOWNLOAD_NAME"
            "$WINDOWS_DOWNLOAD_NAME"
            "$CHECKSUMS_NAME"
            "$LATEST_NAME"
          )
          REMOTE_ASSETS="$(gh release view "$TAG" --json assets --jq '.assets[].name')"
          for EXPECTED_NAME in "${WHITELIST[@]}"; do
            if ! grep -Fxq "$EXPECTED_NAME" <<< "$REMOTE_ASSETS"; then
              echo "错误: 上传后远端缺少白名单资产: $EXPECTED_NAME" >&2
              exit 1
            fi
          done

          is_whitelisted() {
            local candidate="$1"
            local expected
            for expected in "${WHITELIST[@]}"; do
              if [[ "$candidate" == "$expected" ]]; then
                return 0
              fi
            done
            return 1
          }

          while IFS= read -r ASSET_NAME; do
            if [[ -n "$ASSET_NAME" ]] && ! is_whitelisted "$ASSET_NAME"; then
              echo "删除非本轮资产: $ASSET_NAME"
              gh release delete-asset "$TAG" "$ASSET_NAME" --yes
            fi
          done <<< "$REMOTE_ASSETS"

          FINAL_REMOTE_ASSETS="$(gh release view "$TAG" --json assets --jq '.assets[].name')"
          mapfile -t FINAL_ASSET_NAMES < <(sed '/^$/d' <<< "$FINAL_REMOTE_ASSETS")
          if (( ${#FINAL_ASSET_NAMES[@]} != ${#WHITELIST[@]} )); then
            echo "错误: 清理后的远端资产数量不是 ${#WHITELIST[@]}" >&2
            exit 1
          fi
          for EXPECTED_NAME in "${WHITELIST[@]}"; do
            if ! grep -Fxq "$EXPECTED_NAME" <<< "$FINAL_REMOTE_ASSETS"; then
              echo "错误: 清理后远端缺少白名单资产: $EXPECTED_NAME" >&2
              exit 1
            fi
          done

          gh release edit "$TAG" --notes "$NOTES"
          echo "✓ Release 发布完成: $TAG"
