name: 🚀 Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "版本标签（如 v0.5.2）"
        required: true
        type: string
      draft:
        description: "创建为草稿"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "标记为预发布"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  NODE_VERSION: "20"
  RUST_VERSION: "stable"

jobs:
  # ─── 版本解析 ─────────────────────────────────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      is_manual: ${{ steps.resolve.outputs.is_manual }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.ref_name }}"
            IS_MANUAL="false"
          else
            TAG="${{ inputs.tag }}"
            IS_MANUAL="true"
          fi
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_manual=${IS_MANUAL}" >> "$GITHUB_OUTPUT"
          echo "✓ 版本: ${VERSION}  标签: ${TAG}"

  # ─── 桌面端构建 ───────────────────────────────────
  desktop:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ needs.meta.outputs.version }}
      tag: ${{ needs.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 构建桌面应用
        if: matrix.os != 'macos-latest'
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run tauri:build

      - name: 构建桌面应用（仅 .app）
        if: matrix.os == 'macos-latest'
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx tauri build --bundles app

      - name: macOS 代码签名 (.app + DMG)
        if: matrix.os == 'macos-latest'
        env:
          CODESIGN_P12: ${{ secrets.CODESIGN_P12 }}
        run: |
          echo "$CODESIGN_P12" | base64 -d > woo-codesign.p12

          # 创建临时钥匙串并导入 P12（原生 codesign 确保完整证书链嵌入）
          security create-keychain -p temp temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          security import woo-codesign.p12 -k temp.keychain -P woo2026 -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp temp.keychain

          # 签名 .app（不启用 hardened runtime，自签证书无需公证）
          /usr/bin/codesign --sign "Woo Notes" --deep --force --timestamp=none \
            src-tauri/target/release/bundle/macos/Woo.app

          # 验证签名
          echo "=== 签名验证 ==="
          /usr/bin/codesign -dvvv src-tauri/target/release/bundle/macos/Woo.app 2>&1 | head -10

          # 清理
          security delete-keychain temp.keychain

      - name: 打包 DMG（Tauri 2 兼容）
        if: matrix.os == 'macos-latest'
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          CODESIGN_P12: ${{ secrets.CODESIGN_P12 }}
        run: |
          set -eo pipefail

          APP="src-tauri/target/release/bundle/macos/Woo.app"
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          DMG_NAME="Woo_${VERSION}_aarch64"
          DMG_TEMP="$DMG_DIR/rw.${DMG_NAME}.dmg"
          DMG_FINAL="$DMG_DIR/${DMG_NAME}.dmg"

          rm -rf "$DMG_DIR"
          mkdir -p "$DMG_DIR"

          # 1. 创建临时 UDRW DMG（与 Tauri 2 bundle_dmg.sh 完全一致）
          echo "→ 创建临时 DMG..."
          hdiutil create \
            -srcfolder "$APP" \
            -volname "Woo" \
            -fs HFS+ \
            -fsargs "-c c=64,a=16,e=16" \
            -format UDRW \
            "$DMG_TEMP"

          # 2. 扩容（Tauri 2: 源大小 + 20MB，不低于 hdiutil 下限）
          SIZE_BLOCKS=$(du -B 512 -s "$DMG_TEMP" | sed -e 's/\t.*//g')
          SIZE_MB=$(( ($SIZE_BLOCKS * 512 / 1000 / 1000) + 1 + 20 ))
          MIN_SIZE=$(hdiutil resize -limits "$DMG_TEMP" | awk 'NR==1{print int($1/2048+1)}')
          if [ "$MIN_SIZE" -gt "$SIZE_MB" ]; then SIZE_MB="$MIN_SIZE"; fi
          echo "→ 扩容至 ${SIZE_MB}MB..."
          hdiutil resize -size "${SIZE_MB}m" "$DMG_TEMP"

          # 3. 挂载
          echo "→ 挂载 DMG..."
          DEV_LINE=$(hdiutil attach -mountrandom /Volumes -readwrite -noverify -noautoopen -nobrowse "$DMG_TEMP" | grep -E --color=never '^/dev/')
          DEV_NAME=$(echo "$DEV_LINE" | sed 1q | awk '{print $1}')

          # 查找挂载目录（与 Tauri 2 find_mount_dir 一致）
          MOUNT_DIR=""
          for i in $(seq 1 9); do
            CANDIDATE=$(hdiutil info | grep -E --color=never "$DEV_NAME" | head -$i | awk '{print $3}' | xargs)
            if [ -n "$CANDIDATE" ]; then
              MOUNT_DIR="$CANDIDATE"
              break
            fi
          done
          if [ -z "$MOUNT_DIR" ]; then
            echo "错误: 无法找到挂载目录"
            exit 1
          fi
          echo "→ 挂载目录: $MOUNT_DIR"

          # 4. 创建 Applications 快捷方式（与 Tauri 2 一致）
          echo "→ 创建 Applications 快捷方式..."
          ln -s /Applications "$MOUNT_DIR/Applications"

          # 5. 修复权限（与 Tauri 2 一致）
          echo "→ 修复权限..."
          chmod -Rf go-w "$MOUNT_DIR" || true

          # 6. 清理 .fseventsd（与 Tauri 2 一致）
          echo "→ 清理 .fseventsd..."
          rm -rf "$MOUNT_DIR/.fseventsd" || true

          # 7. 卸载（带重试，与 Tauri 2 hdiutil_detach_retry 一致）
          echo "→ 卸载 DMG..."
          ATTEMPT=0
          until hdiutil detach "$DEV_NAME"; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -ge 3 ]; then
              echo "错误: 卸载失败"
              exit 1
            fi
            echo "重试 $ATTEMPT..."
            sleep $((1 * (2 ** ATTEMPT)))
          done

          # 8. 转换为最终 UDZO 格式（与 Tauri 2 一致: zlib-level=9）
          echo "→ 压缩为最终 DMG..."
          hdiutil convert "$DMG_TEMP" -format UDZO -imagekey zlib-level=9 -o "$DMG_FINAL"
          rm -f "$DMG_TEMP"

          # 9. 对 DMG 签名
          echo "→ 签名 DMG..."
          echo "$CODESIGN_P12" | base64 -d > woo-codesign.p12

          security create-keychain -p temp temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          security import woo-codesign.p12 -k temp.keychain -P woo2026 -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp temp.keychain

          /usr/bin/codesign --sign "Woo Notes" --force --timestamp=none "$DMG_FINAL"
          security delete-keychain temp.keychain

          # 10. 附上公钥证书
          cp woo-codesign.cer "$DMG_DIR/"
          ls -lh "$DMG_DIR"

      - name: 上传桌面端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: woo-desktop-${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/**/*
          if-no-files-found: warn

  # ─── Android 构建 ───────────────────────────────────
  android:
    needs: meta
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ needs.meta.outputs.version }}
      tag: ${{ needs.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 安装 Rust（含 Android 目标）
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 缓存 Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 NDK
        run: |
          sdkmanager "ndk;26.3.11579264" \
                     "build-tools;35.0.0" \
                     "platforms;android-35"

      - name: 安装前端依赖
        run: npm ci

      - name: 限定 APK 单架构 (aarch64)
        run: |
          printf '\n%s\n%s\n%s\n' \
            'targetList=aarch64' \
            'abiList=arm64-v8a' \
            'archList=arm64' \
            >> src-tauri/gen/android/gradle.properties

      - name: 构建 Android APK
        env:
          CI: true
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.3.11579264
        run: npm run tauri:android:build

      - name: 上传 Android 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: woo-android
          path: src-tauri/gen/android/app/build/outputs/apk
          if-no-files-found: warn

  # ─── 发布 ──────────────────────────────────────────
  release:
    needs: [meta, desktop, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 生成发布说明
        id: notes
        shell: bash
        run: |
          TAG="${{ needs.meta.outputs.tag }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV" ]; then
            NOTES=$(git log "$PREV..$TAG" --no-merges --format="- %s" \
              | sed 's/^feat(\(.*\)):/* **✨ \1:** /' \
              | sed 's/^feat:/* **✨ 新功能:** /' \
              | sed 's/^fix(\(.*\)):/* **🔧 \1:** /' \
              | sed 's/^fix:/* **🔧 修复:** /' \
              | sed 's/^chore(\(.*\)):/* **🏗️ \1:** /' \
              | sed 's/^chore:/* **🏗️ 工程:** /' \
              | sed 's/^docs(\(.*\)):/* **📖 \1:** /' \
              | sed 's/^docs:/* **📖 文档:** /' \
              | sed 's/^refactor(\(.*\)):/* **♻️ \1:** /' \
              | sed 's/^refactor:/* **♻️ 重构:** /' )
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "## 无我笔记 v${{ needs.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "---" >> "$GITHUB_OUTPUT"
            echo "📦 [完整变更](${{ github.server_url }}/${{ github.repository }}/compare/${PREV}...${TAG})" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "## 无我笔记 v${{ needs.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "🎉 首次发布" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
          echo "✓ 发布说明生成完成"

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: woo-*
          path: release-assets
          merge-multiple: true

      - name: 整理发布文件
        shell: bash
        run: |
          mkdir -p release
          # 重命名文件为统一格式
          find release-assets -type f \( -name "*.dmg" -o -name "*.apk" -o -name "*.exe" -o -name "*.cer" \) -exec cp {} release/ \;
          ls -lh release/

      - name: 创建 GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
          NOTES: ${{ steps.notes.outputs.notes }}
          IS_MANUAL: ${{ needs.meta.outputs.is_manual }}
        run: |
          FILES=(release/*)
          if [ ${#FILES[@]} -eq 0 ] || [ ! -e "${FILES[0]}" ]; then
            echo "⚠️ 没有找到发布文件"
            exit 1
          fi

          DRAFT="${{ inputs.draft }}"
          PRERELEASE="${{ inputs.prerelease }}"

          if [ "$IS_MANUAL" == "true" ]; then
            DRAFT_FLAG="${DRAFT:-true}"
            PRERELEASE_FLAG="${PRERELEASE:-false}"
          else
            DRAFT_FLAG="false"
            PRERELEASE_FLAG="false"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，更新中..."
            gh release upload "$TAG" "${FILES[@]}" --clobber
            gh release edit "$TAG" --notes "$NOTES"
          else
            echo "创建 Release $TAG..."
            gh release create "$TAG" \
              --title "无我笔记 v${{ needs.meta.outputs.version }}" \
              --notes "$NOTES" \
              --draft="$DRAFT_FLAG" \
              --prerelease="$PRERELEASE_FLAG" \
              "${FILES[@]}"
          fi
          echo "✓ Release 发布完成: $TAG"
